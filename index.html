<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kyvadlo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Raleway:wght@100;200&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f0ead6;
      --muted: rgba(240,234,214,0.35);
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Raleway', sans-serif;
      font-weight: 100;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Starfield */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: var(--op); transform: scale(1); }
    }

    /* Radial glow behind pendulum */
    .glow-bg {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* Title */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-top: 52px;
      letter-spacing: 0.35em;
    }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 7vw, 5rem);
      color: var(--gold-light);
      line-height: 1;
      text-shadow: 0 0 60px rgba(201,168,76,0.4);
    }
    header p {
      margin-top: 10px;
      font-size: 0.68rem;
      letter-spacing: 0.5em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Decorative line */
    .divider {
      position: relative;
      z-index: 10;
      width: 220px;
      height: 1px;
      margin: 24px auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.6;
    }

    /* SVG pendulum stage */
    .stage {
      position: relative;
      z-index: 10;
      width: min(480px, 90vw);
      margin-top: 10px;
    }
    .stage svg {
      width: 100%;
      height: auto;
      overflow: visible;
    }

    /* Pendulum pivot decoration */
    .pivot-cap {
      fill: var(--gold);
      filter: drop-shadow(0 0 6px rgba(201,168,76,0.8));
    }

    /* Pendulum rod */
    .rod {
      stroke: url(#rodGrad);
      stroke-width: 2;
      stroke-linecap: round;
      fill: none;
    }

    /* Bob */
    .bob-outer {
      fill: url(#bobGrad);
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.7));
    }
    .bob-inner {
      fill: rgba(255,255,220,0.15);
    }
    .bob-shine {
      fill: rgba(255,255,240,0.45);
    }

    /* Swing animation */
    .pendulum-group {
      transform-origin: 240px 60px;
      animation: swing 2.8s cubic-bezier(0.37,0,0.63,1) infinite alternate;
    }
    @keyframes swing {
      from { transform: rotate(-28deg); }
      to   { transform: rotate( 28deg); }
    }

    /* Trail / shadow pendulums */
    .trail-1 {
      opacity: 0.18;
      transform-origin: 240px 60px;
      animation: swing 2.8s cubic-bezier(0.37,0,0.63,1) infinite alternate;
      animation-delay: -0.12s;
    }
    .trail-2 {
      opacity: 0.08;
      transform-origin: 240px 60px;
      animation: swing 2.8s cubic-bezier(0.37,0,0.63,1) infinite alternate;
      animation-delay: -0.24s;
    }

    /* Arc trace */
    .arc-path {
      fill: none;
      stroke: var(--gold);
      stroke-width: 1;
      stroke-dasharray: 4 6;
      opacity: 0.2;
    }

    /* Info cards */
    .info-row {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 20px;
      margin-top: 8px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 16px;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      padding: 16px 24px;
      text-align: center;
      min-width: 120px;
      backdrop-filter: blur(4px);
      transition: border-color 0.3s;
    }
    .card:hover {
      border-color: rgba(201,168,76,0.6);
    }
    .card-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      color: var(--gold-light);
      font-weight: 300;
    }
    .card-label {
      margin-top: 4px;
      font-size: 0.58rem;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Quote */
    .quote {
      position: relative;
      z-index: 10;
      margin-top: 36px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--muted);
      text-align: center;
      max-width: 380px;
      line-height: 1.8;
      padding: 0 20px 40px;
    }
    .quote span {
      color: rgba(201,168,76,0.5);
    }
  </style>
</head>
<body>

  <!-- Stars -->
  <div class="stars" id="stars"></div>
  <div class="glow-bg"></div>

  <header>
    <h1>Kyvadlo</h1>
    <p>Večný pohyb času</p>
  </header>
  <div class="divider"></div>

  <!-- SVG Pendulum -->
  <div class="stage">
    <svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Rod gradient -->
        <linearGradient id="rodGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#8a6820"/>
          <stop offset="50%"  stop-color="#e8c97a"/>
          <stop offset="100%" stop-color="#8a6820"/>
        </linearGradient>
        <!-- Bob gradient -->
        <radialGradient id="bobGrad" cx="38%" cy="32%" r="60%">
          <stop offset="0%"   stop-color="#f5e199"/>
          <stop offset="40%"  stop-color="#c9a84c"/>
          <stop offset="100%" stop-color="#6b4a10"/>
        </radialGradient>
        <!-- Support beam gradient -->
        <linearGradient id="beamGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c9a84c"/>
          <stop offset="100%" stop-color="#4a3510"/>
        </linearGradient>
        <!-- Glow filter -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Support beam -->
      <rect x="180" y="20" width="120" height="8" rx="4" fill="url(#beamGrad)" opacity="0.9"/>
      <rect x="236" y="28" width="8" height="34" rx="3" fill="url(#beamGrad)" opacity="0.7"/>

      <!-- Arc trace -->
      <path class="arc-path" d="M 122,360 A 190,190 0 0,1 358,360"/>

      <!-- Trail 2 -->
      <g class="trail-2">
        <line x1="240" y1="60" x2="240" y2="340" class="rod"/>
        <circle cx="240" cy="345" r="28" class="bob-outer"/>
      </g>
      <!-- Trail 1 -->
      <g class="trail-1">
        <line x1="240" y1="60" x2="240" y2="340" class="rod"/>
        <circle cx="240" cy="345" r="28" class="bob-outer"/>
      </g>

      <!-- Main pendulum -->
      <g class="pendulum-group" filter="url(#glow)">
        <line x1="240" y1="60" x2="240" y2="340" class="rod"/>
        <!-- Bob layers -->
        <circle cx="240" cy="345" r="32" class="bob-outer"/>
        <circle cx="240" cy="345" r="24" class="bob-inner"/>
        <ellipse cx="232" cy="336" rx="8" ry="5" class="bob-shine"/>
        <!-- Bob detail ring -->
        <circle cx="240" cy="345" r="32" fill="none" stroke="rgba(255,240,180,0.25)" stroke-width="1.5"/>
        <circle cx="240" cy="345" r="20" fill="none" stroke="rgba(255,240,180,0.1)" stroke-width="1"/>
      </g>

      <!-- Pivot cap -->
      <circle cx="240" cy="60" r="9" class="pivot-cap"/>
      <circle cx="240" cy="60" r="5" fill="#f5e199" opacity="0.8"/>
    </svg>
  </div>

  <!-- Info cards -->
  <div class="info-row">
    <div class="card">
      <div class="card-value">2.8s</div>
      <div class="card-label">Perióda</div>
    </div>
    <div class="card">
      <div class="card-value">28°</div>
      <div class="card-label">Amplitúda</div>
    </div>
    <div class="card">
      <div class="card-value">L</div>
      <div class="card-label">Dĺžka</div>
    </div>
    <div class="card">
      <div class="card-value">g</div>
      <div class="card-label">Gravitácia</div>
    </div>
  </div>

  <p class="quote">
    <span>„</span>Kyvadlo nemerá čas —<br/>
    čas meria kyvadloaaaa.<span>"</span>
  </p>

  <script>
    // Generate random stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 140; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2 + 0.5;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --dur:${(Math.random()*3+2).toFixed(1)}s;
        --op:${(Math.random()*0.7+0.1).toFixed(2)};
        animation-delay:${(Math.random()*4).toFixed(1)}s;
      `;
      starsEl.appendChild(s);
    }
  </script>
</body>
</html>
